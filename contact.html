<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Sulaco Digital</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-image: radial-gradient(ellipse 160% 70% at 50% 48%, #020105 0%, #0f0524 18%, #2a1565 35%, #5a35e6 55%, #9b6dff 72%, #d8c8ff 88%);
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="nav-logo">Sulaco Digital</a>
        <ul class="nav-links">
            <li><a href="about.html">About</a></li>
            <li><a href="index.html#portfolio">Portfolio</a></li>
            <li><a href="blog.html">Blog</a></li>
        </ul>
        <a href="contact.html" class="nav-cta">CONTACT US</a>
    </nav>

    <div class="page-hero">
        <h1>Get <span>In Touch</span></h1>
        <p>Have a project in mind, or just want to say hello? Send a message and I'll get back to you.</p>
    </div>

    <div class="contact-form-wrap">
        <form action="#" method="post">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your name" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" placeholder="Tell me about your project..." required></textarea>
            </div>
            <button type="submit" class="btn-primary" style="display:block; margin:0 auto;">SEND MESSAGE</button>
        </form>

        <div class="contact-alt">
            <p>Prefer email? Reach out directly at <strong>hello@sulacodigital.com</strong></p>
            <div class="social-links">
                <a href="https://facebook.com" target="_blank" rel="noopener">f</a>
                <a href="https://x.com" target="_blank" rel="noopener">x</a>
                <a href="https://linkedin.com" target="_blank" rel="noopener">in</a>
                <a href="https://youtube.com" target="_blank" rel="noopener">yt</a>
            </div>
        </div>
    </div>

</body>
</html>
